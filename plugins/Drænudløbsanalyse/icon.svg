<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Pipe outer wall -->
  <circle cx="12" cy="12" r="11" fill="#6b6b6b" stroke="#3a3a3a" stroke-width="0.8"/>
  <!-- Pipe inner wall (dark ring) -->
  <circle cx="12" cy="12" r="8" fill="#2a2a2a"/>
  <!-- Pipe opening (water / sky blue) -->
  <circle cx="12" cy="12" r="6.5" fill="#2980b9"/>
  <!-- Water surface sheen -->
  <ellipse cx="10.5" cy="10" rx="3" ry="1.2" fill="white" opacity="0.25"/>
  <!-- Small highlight dot -->
  <circle cx="9.5" cy="9.5" r="1" fill="white" opacity="0.35"/>
</svg>
