name: Deploy QGIS Plugin Repository

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Byg plugins og generér plugins.xml
        run: |
          mkdir -p dist

          XML_ENTRIES=""

          for PLUGIN_DIR in plugins/*/; do
            NAME=$(basename "$PLUGIN_DIR")
            META="$PLUGIN_DIR/metadata.txt"

            if [ ! -f "$META" ]; then
              echo "Springer $NAME over – ingen metadata.txt"
              continue
            fi

            VERSION=$(grep '^version='     "$META" | cut -d'=' -f2)
            DESCRIPTION=$(grep '^description=' "$META" | cut -d'=' -f2)
            ABOUT=$(grep '^about='        "$META" | cut -d'=' -f2)
            QGIS_MIN=$(grep '^qgisMinimumVersion=' "$META" | cut -d'=' -f2)

            OWNER="${{ github.repository_owner }}"
            REPO="${{ github.event.repository.name }}"
            BASE_URL="https://${OWNER}.github.io/${REPO}"
            DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            ZIP_NAME="${NAME}.zip"

            # Byg zip
            mkdir -p "dist_tmp/$NAME"
            rsync -a "$PLUGIN_DIR" "dist_tmp/$NAME/"
            cd dist_tmp
            zip -r "../dist/${ZIP_NAME}" "$NAME/"
            cd ..
            rm -rf dist_tmp

            XML_ENTRIES="${XML_ENTRIES}
            <pyqgis_plugin name=\"${NAME}\" version=\"${VERSION}\">
              <description>${DESCRIPTION}</description>
              <about>${ABOUT}</about>
              <version>${VERSION}</version>
              <qgis_minimum_version>${QGIS_MIN}</qgis_minimum_version>
              <homepage>${BASE_URL}</homepage>
              <file_name>${ZIP_NAME}</file_name>
              <icon>icon.png</icon>
              <author_name>${OWNER}</author_name>
              <download_url>${BASE_URL}/${ZIP_NAME}</download_url>
              <update_date>${DATE}</update_date>
              <experimental>False</experimental>
              <deprecated>False</deprecated>
              <tracker>https://github.com/${OWNER}/${REPO}/issues</tracker>
              <repository>https://github.com/${OWNER}/${REPO}</repository>
            </pyqgis_plugin>"

            echo "Bygget $NAME v${VERSION}"
          done

          cat > dist/plugins.xml << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <plugins>
          ${XML_ENTRIES}
          </plugins>
          EOF

      - name: Generér index.html
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          BASE_URL="https://${OWNER}.github.io/${REPO}"
          DATE=$(date +"%d.%m.%Y")

          PLUGIN_LIST=""
          for PLUGIN_DIR in plugins/*/; do
            NAME=$(basename "$PLUGIN_DIR")
            VERSION=$(grep '^version=' "$PLUGIN_DIR/metadata.txt" 2>/dev/null | cut -d'=' -f2)
            PLUGIN_LIST="${PLUGIN_LIST}<li><strong>${NAME}</strong> v${VERSION} &mdash; <a href=\"${NAME}.zip\">download</a></li>"
          done

          cat > dist/index.html << EOF
          <!DOCTYPE html>
          <html lang="da">
          <head>
            <meta charset="UTF-8">
            <title>Limfjordssekretariatet QGIS Plugins</title>
            <style>
              body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; color: #222; line-height: 1.6; }
              h1   { color: #2c7a2c; }
              code { background: #f0f0f0; padding: 2px 6px; border-radius: 3px; }
              pre  { background: #f0f0f0; padding: 12px; border-radius: 5px; overflow-x: auto; }
            </style>
          </head>
          <body>
            <h1>Limfjordssekretariatet QGIS Plugins</h1>
            <p>Opdateret ${DATE}</p>
            <h2>Tilgængelige plugins</h2>
            <ul>${PLUGIN_LIST}</ul>
            <h2>Installation i QGIS</h2>
            <ol>
              <li>Åbn QGIS</li>
              <li>Gå til <strong>Plugins → Manage and Install Plugins → Settings</strong></li>
              <li>Klik <strong>Add</strong> under "Plugin Repositories"</li>
              <li>Indsæt denne URL:
                <pre>${BASE_URL}/plugins.xml</pre>
              </li>
              <li>Gå til fanen <strong>All</strong> og søg efter det ønskede plugin</li>
              <li>Klik <strong>Install Plugin</strong></li>
            </ol>
          </body>
          </html>
          EOF

      - name: Deploy til GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
